{% extends "base.html" %}

{% block title %}{% if is_edit %}Edit Expense{% else %}Add Expense{% endif %} — Spendly{% endblock %}

{% block content %}

<section class="expense-section">
    <div class="expense-container">

        <div class="expense-header">
            <a href="{{ url_for('dashboard') }}" class="btn-back">← Back</a>
            <h1 class="expense-title">{% if is_edit %}Edit Expense{% else %}Add New Expense{% endif %}</h1>
        </div>

        <div class="expense-card">
            {% if error %}
            <div class="expense-error">{{ error }}</div>
            {% endif %}

            <form method="POST" action="{% if is_edit %}{{ url_for('edit_expense', id=expense.id) }}{% else %}{{ url_for('add_expense') }}{% endif %}" class="expense-form">
                
                <div class="form-group">
                    <label for="description">Description</label>
                    <input type="text" id="description" name="description"
                           class="form-input" placeholder="e.g., Grocery shopping, Fuel"
                           value="{{ expense.description if is_edit else '' }}"
                           required autofocus>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="amount">Amount (₹)</label>
                        <input type="number" id="amount" name="amount"
                               class="form-input" placeholder="0.00"
                               step="0.01" min="0" 
                               value="{{ expense.amount if is_edit else '' }}"
                               required>
                    </div>

                    <div class="form-group">
                        <label for="category">Category</label>
                        <select id="category" name="category" class="form-input" required>
                            <option value="">Select a category</option>
                            <option value="Food" {% if is_edit and expense.category == 'Food' %}selected{% endif %}>Food & Dining</option>
                            <option value="Transport" {% if is_edit and expense.category == 'Transport' %}selected{% endif %}>Transport</option>
                            <option value="Shopping" {% if is_edit and expense.category == 'Shopping' %}selected{% endif %}>Shopping</option>
                            <option value="Entertainment" {% if is_edit and expense.category == 'Entertainment' %}selected{% endif %}>Entertainment</option>
                            <option value="Utilities" {% if is_edit and expense.category == 'Utilities' %}selected{% endif %}>Utilities</option>
                            <option value="Health" {% if is_edit and expense.category == 'Health' %}selected{% endif %}>Health & Medical</option>
                            <option value="Education" {% if is_edit and expense.category == 'Education' %}selected{% endif %}>Education</option>
                            <option value="Other" {% if is_edit and expense.category == 'Other' %}selected{% endif %}>Other</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="date">Date</label>
                    <input type="date" id="date" name="date"
                           class="form-input"
                           value="{{ expense.date if is_edit else today }}"
                           required>
                </div>

                <div class="form-group">
                    <label for="notes">Notes (Optional)</label>
                    <textarea id="notes" name="notes"
                              class="form-textarea" placeholder="Add any additional notes..."
                              rows="4">{{ expense.notes if is_edit else '' }}</textarea>
                </div>

                <div class="form-actions">
                    <a href="{{ url_for('dashboard') }}" class="btn-secondary">Cancel</a>
                    <button type="submit" class="btn-submit">{% if is_edit %}Update Expense{% else %}Add Expense{% endif %}</button>
                </div>
            </form>
        </div>

    </div>
</section>

{% endblock %}
